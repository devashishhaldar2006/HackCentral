server {
    listen 80;
    
    # Where the static files are stored
    root /usr/share/nginx/html;
    index index.html;

    # 1. Handle React Routing (SPA)
    # Any route like /dashboard will fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Reverse Proxy for Backend API
    # Any request starting with /api is forwarded to the backend container
    location /api/ {
        proxy_pass http://backend:7777;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 3. Reverse Proxy for Socket.io
    location /socket.io/ {
        proxy_pass http://backend:7777;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}
